# lighttpd — nas-gallery
#
# Place at /etc/lighttpd/conf-available/50-gallery.conf and enable with
# lighttpd-enable-mod gallery (Debian) or include from lighttpd.conf.
#
# Reload: lighttpd -tt -f /etc/lighttpd/lighttpd.conf && systemctl reload lighttpd

server.modules += ( "mod_alias", "mod_setenv", "mod_compress" )

# Static gallery + originals
alias.url += (
    "/gallery/originals/" => "/data/photo/",
    "/gallery/"           => "/var/www/html/gallery/",
)

# Make sure webp gets the right MIME (lighttpd <1.4.55 didn't have it)
mimetype.assign += (
    ".webp" => "image/webp",
)

# Compress JSON/JS/CSS in flight
compress.cache-dir       = "/var/cache/lighttpd/compress/"
compress.filetype        = ( "application/json", "application/javascript", "text/css", "text/html" )

# Long cache on thumbs
$HTTP["url"] =~ "^/gallery/thumbs/" {
    setenv.add-response-header += ( "Cache-Control" => "public, max-age=31536000, immutable" )
}
