# nginx — nas-gallery
#
# Drop this into a server { } block, or save under
# /etc/nginx/conf.d/gallery.conf and include from your main server.
#
# Reload: nginx -t && systemctl reload nginx

# Static gallery files (whatever you rsync into /var/www/html/gallery/)
location /gallery/ {
    alias /var/www/html/gallery/;
    try_files $uri $uri/ =404;
}

# Originals exposed without copying — points straight at the library
location /gallery/originals/ {
    alias /data/photo/;
    autoindex off;
}

# Optional: better mime type for WebP (modern nginx ships this; older
# distros sometimes don't).
types {
    image/webp  webp;
    application/json  json;
}

# Optional: gzip text payloads. WebP is already compressed — skip it.
gzip on;
gzip_types application/json application/javascript text/css text/html;
gzip_min_length 1024;

# Optional: long cache on thumbs (IDs are content-derived, never rewritten).
location ~ ^/gallery/thumbs/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}
