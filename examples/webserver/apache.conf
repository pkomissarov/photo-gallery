# Apache 2.4 — photo-gallery
#
# Place at: /etc/apache2/conf-available/gallery.conf  (Debian/Ubuntu)
#        or /etc/httpd/conf.d/gallery.conf           (CentOS/RHEL)
#
# Enable on Debian/Ubuntu:
#   a2enconf gallery
#   apache2ctl configtest && systemctl reload apache2
#
# Assumes:
#   - Gallery's static files are rsynced to /var/www/html/gallery/
#     (which is the default DocumentRoot/gallery/ on Debian).
#   - Your photo library lives at /data/photo (adjust ServerAdmin path).
#
# The gallery itself is served from DocumentRoot — no extra Alias needed
# if you put it under DocumentRoot/gallery/. Originals are exposed
# through an Alias that points at the library root, so files aren't
# duplicated on disk.

Alias /gallery/originals /data/photo
<Directory /data/photo>
    Require all granted
    Options FollowSymLinks
    AllowOverride None
</Directory>

# Optional: bigger gzip win for the manifest. Most distros ship mod_deflate
# enabled by default; uncomment if you need to be explicit.
#
# <IfModule mod_deflate.c>
#     AddOutputFilterByType DEFLATE application/json
#     AddOutputFilterByType DEFLATE application/javascript
#     AddOutputFilterByType DEFLATE text/css
#     AddOutputFilterByType DEFLATE text/html
# </IfModule>

# Optional: aggressive caching for thumbnails (they never change content
# for a given ID — IDs are content-derived hashes).
#
# <LocationMatch "^/gallery/thumbs/">
#     Header set Cache-Control "public, max-age=31536000, immutable"
# </LocationMatch>
